<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Nebula</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Project Nebula</h1>
            <p>Focus to form your universe.</p>
        </header>

	<section id="login-section" class="login-box">
            <h2>Enter the Observatory</h2>
            <form id="login-form">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Log In</button>
            </form>
            <p id="login-error" class="error-text" style="display: none;">Invalid coordinates (Wrong username or password).</p>
            <p style="margin-top: 15px; font-size: 0.9rem;">No universe yet? <a href="#" id="show-signup" style="color: var(--accent-blue);">Form one here</a>.</p>
        </section>

        <section id="signup-section" class="login-box" style="display: none;">
            <h2>Form a New Universe</h2>
            <form id="signup-form">
                <input type="text" id="signup-username" placeholder="Username" required>
                <input type="email" id="signup-email" placeholder="Email Address" required>
                <input type="password" id="signup-password" placeholder="Password" required>
                <button type="submit">Sign Up</button>
            </form>
            <p id="signup-msg" style="display: none; margin-top: 10px;"></p>
            <p style="margin-top: 15px; font-size: 0.9rem;">Already have an observatory? <a href="#" id="show-login" style="color: var(--accent-blue);">Log in</a>.</p>
        </section>

        <main id="app-section" style="display: none;">
            <section class="timer-section">
                <div id="stellar-visual">
                    <div id="star-core" class="star-core"></div>
                </div>
                
                <h2 id="time-display">25:00</h2>
                
                <input type="text" id="task-input" placeholder="e.g., LIGO O4b k-corrections..." autocomplete="off" style="margin-bottom: 20px; text-align: center;">
		<div class="slider-container" id="timer-setup">
	            <label for="time-slider" id="slider-label">Orbit Duration: 25 minutes</label>
	            <input type="range" id="time-slider" min="15" max="120" value="25" step="1">
	        </div>
                <div class="controls">
                    <button id="start-btn">Start Ignition</button>
                    <button id="abort-btn" class="danger" disabled>Abort (Core Collapse)</button>
                    <button id="logout-btn" style="margin-top: 20px;">Log Out</button>
                </div>
            </section>

            <section class="dashboard-section">
                <h3>Recent Formations</h3>
                <ul id="session-list">
                    <li>Loading universe...</li>
                </ul>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
