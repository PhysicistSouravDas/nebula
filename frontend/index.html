<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Nebula</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Project Nebula</h1>
            <p>Focus to form your universe.</p>
        </header>

        <section id="login-section" class="login-box">
            <h2>Enter the Observatory</h2>
            <form id="login-form">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Log In</button>
            </form>
            <p id="login-error" class="error-text" style="display: none;">Invalid coordinates (wrong username or password).</p>
        </section>

        <main id="app-section" style="display: none;">
            <section class="timer-section">
                <div id="stellar-visual">
                    <div id="star-core" class="star-core"></div>
                </div>
                
                <h2 id="time-display">25:00</h2>
                
                <input type="text" id="task-input" placeholder="e.g., LIGO O4b k-corrections..." autocomplete="off" style="margin-bottom: 20px; text-align: center;">
                <div class="controls">
                    <button id="start-btn">Start Ignition</button>
                    <button id="abort-btn" class="danger" disabled>Abort (Core Collapse)</button>
                    <button id="logout-btn" style="margin-top: 20px;">Log Out</button>
                </div>
            </section>

            <section class="dashboard-section">
                <h3>Recent Formations</h3>
                <ul id="session-list">
                    <li>Loading universe...</li>
                </ul>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
